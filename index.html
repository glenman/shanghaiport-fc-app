                        <td>{season.losses || '-'}</td>
                        <td>{season.goalsFor || '-'}</td>
                        <td>{season.goalsAgainst || '-'}</td>
                        <td>{season.points || '-'}</td>
                        <td>{season.notes || '-'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      // 历史数据统计组件
      const Statistics = () => {
        const [selectedSeason, setSelectedSeason] = React.useState('2025');
        const [statisticsType, setStatisticsType] = React.useState('goals'); // goals or assists
        const [data, setData] = React.useState([]);
        const [loading, setLoading] = React.useState(true);
        const [error, setError] = React.useState(null);

        // 从JSON文件加载数据
        React.useEffect(() => {
          fetch('data/goal_details.json')
            .then(response => {
              if (!response.ok) {
                throw new Error('Network response was not ok');
              }
              return response.json();
            })
            .then(data => {
              setData(data);
              setLoading(false);
            })
            .catch(error => {
              console.error('Error loading data:', error);
              setError('加载数据失败，请刷新页面重试');
              setLoading(false);
            });
        }, []);

        // 处理数据统计
        const processStatistics = () => {
          if (loading || error) return { seasons: [], currentData: [] };

          // 提取所有赛季
          const seasonsSet = new Set(data.map(item => item.season));
          const seasons = Array.from(seasonsSet).sort().reverse();

          // 按赛季和类型统计
          const statsBySeason = {};
          
          seasons.forEach(season => {
            statsBySeason[season] = {
              goals: [],
              assists: []
            };
          });

          // 统计进球
          const goalStats = {};
          data.forEach(item => {
            const player = item.goal_player;
            const season = item.season;
            const matchType = item.match_type;
            
            if (!goalStats[player]) {
              goalStats[player] = {};
            }
            if (!goalStats[player][season]) {
              goalStats[player][season] = {
                league: 0,
                faCup: 0,
                superCup: 0,
                afc: 0,
                total: 0
              };
            }
            
            // 根据比赛类型统计
            if (matchType.includes('中超')) {
              goalStats[player][season].league += 1;
            } else if (matchType.includes('足协杯')) {
              goalStats[player][season].faCup += 1;
            } else if (matchType.includes('超级杯')) {
              goalStats[player][season].superCup += 1;
            } else if (matchType.includes('亚冠')) {
              goalStats[player][season].afc += 1;
            }
            goalStats[player][season].total += 1;
          });

          // 统计助攻
          const assistStats = {};
          data.forEach(item => {
            const player = item.assist_player;
            if (!player || player === '—' || player === '？') return;
            
            const season = item.season;
            const matchType = item.match_type;
            
            if (!assistStats[player]) {
              assistStats[player] = {};
            }
            if (!assistStats[player][season]) {
              assistStats[player][season] = {
                league: 0,
                faCup: 0,
                superCup: 0,
                afc: 0,
                total: 0
              };
            }
            
            // 根据比赛类型统计
            if (matchType.includes('中超')) {
              assistStats[player][season].league += 1;
            } else if (matchType.includes('足协杯')) {
              assistStats[player][season].faCup += 1;
            } else if (matchType.includes('超级杯')) {
              assistStats[player][season].superCup += 1;
            } else if (matchType.includes('亚冠')) {
              assistStats[player][season].afc += 1;
            }
            assistStats[player][season].total += 1;
          });

          // 转换为排名格式
          seasons.forEach(season => {
            // 进球排名
            const seasonGoalStats = [];
            Object.entries(goalStats).forEach(([player, stats]) => {
              if (stats[season]) {
                seasonGoalStats.push({
                  name: player,
                  ...stats[season]
                });
              }
            });
            
            // 按总进球数排序
            seasonGoalStats.sort((a, b) => b.total - a.total);
            // 添加排名
            statsBySeason[season].goals = seasonGoalStats.map((item, index) => ({
              rank: index + 1,
              ...item
            }));

            // 助攻排名
            const seasonAssistStats = [];
            Object.entries(assistStats).forEach(([player, stats]) => {
              if (stats[season]) {
                seasonAssistStats.push({
                  name: player,
                  ...stats[season]
                });
              }
            });
            
            // 按总助攻数排序
            seasonAssistStats.sort((a, b) => b.total - a.total);
            // 添加排名
            statsBySeason[season].assists = seasonAssistStats.map((item, index) => ({
              rank: index + 1,
              ...item
            }));
          });

          return {
            seasons,
            currentData: statsBySeason[selectedSeason]?.[statisticsType] || []
          };
        };

        const { seasons, currentData } = processStatistics();

        return (
          <div className="card">
            <div className="card-header">
              <h2>历史数据统计</h2>
              <div style={{ marginBottom: '1.5rem', display: 'flex', gap: '1rem', flexWrap: 'wrap' }}>
                <select 
                  value={selectedSeason} 
                  onChange={(e) => setSelectedSeason(e.target.value)}
                  disabled={loading}
                  style={{ 
                    padding: '0.8rem', 
                    borderRadius: '25px', 
                    border: '1px solid #444', 
                    backgroundColor: loading ? 'rgba(50, 50, 50, 0.8)' : 'rgba(30, 30, 30, 0.8)', 
                    color: '#fff', 
                    fontSize: '1rem',
                    cursor: loading ? 'not-allowed' : 'pointer'
                  }}
                >
                  {seasons.map(season => (
                    <option key={season} value={season}>{season}赛季</option>
                  ))}
                </select>
                <div style={{ display: 'flex', gap: '0.5rem' }}>
                  <button 
                    onClick={() => setStatisticsType('goals')}
                    disabled={loading}
                    style={{
                      padding: '0.8rem 1.2rem',
                      borderRadius: '20px',
                      border: '1px solid #444',
                      backgroundColor: loading ? 'rgba(50, 50, 50, 0.8)' : (statisticsType === 'goals' ? 'rgba(192, 0, 16, 0.8)' : 'rgba(40, 40, 40, 0.8)'),
                      color: '#fff',
                      cursor: loading ? 'not-allowed' : 'pointer',
                      transition: 'all 0.3s ease'
                    }}
                  >
                    进球榜
                  </button>
                  <button 
                    onClick={() => setStatisticsType('assists')}
                    disabled={loading}
                    style={{
                      padding: '0.8rem 1.2rem',
                      borderRadius: '20px',
                      border: '1px solid #444',
                      backgroundColor: loading ? 'rgba(50, 50, 50, 0.8)' : (statisticsType === 'assists' ? 'rgba(192, 0, 16, 0.8)' : 'rgba(40, 40, 40, 0.8)'),
                      color: '#fff',
                      cursor: loading ? 'not-allowed' : 'pointer',
                      transition: 'all 0.3s ease'
                    }}
                  >
                    助攻榜
                  </button>
                </div>
              </div>
            </div>
            <div className="card-content">
              {loading ? (
                <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '300px' }}>
                  <div style={{ fontSize: '1.2rem', color: '#c00010' }}>加载数据中...</div>
                </div>
              ) : error ? (
                <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '300px' }}>
                  <div style={{ fontSize: '1.2rem', color: '#ff4444' }}>{error}</div>
                </div>
              ) : (
                <div className="table-container" style={{ marginTop: '1.5rem' }}>
                  <table style={{ minWidth: '800px' }}>
                    <thead>
                      <tr>
                        <th>排名</th>
                        <th>姓名</th>
                        <th>中超联赛</th>
                        <th>足协杯</th>
                        <th>超级杯</th>
                        <th>亚冠联赛(含资格赛)</th>
                        <th>合计</th>
                      </tr>
                    </thead>
                    <tbody>
                      {currentData.length > 0 ? (
                        currentData.map((player, index) => (
                          <tr key={index}>
                            <td>{player.rank}</td>
                            <td>{player.name}</td>
                            <td>{player.league}</td>
                            <td>{player.faCup}</td>
                            <td>{player.superCup}</td>
                            <td>{player.afc}</td>
                            <td>{player.total}</td>
                          </tr>
                        ))
                      ) : (
                        <tr>
                          <td colSpan="7" style={{ textAlign: 'center', padding: '2rem', color: '#ccc' }}>
                            该赛季暂无数据
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        );
      };



      // 主应用组件
      const App = () => {
        const [activeTab, setActiveTab] = React.useState('statistics');
        const [isSidebarCollapsed, setIsSidebarCollapsed] = React.useState(false);
        const [scheduleData, setScheduleData] = React.useState(defaultScheduleData);
        const [playersData, setPlayersData] = React.useState(defaultPlayersData);
        const [seasonsData, setSeasonsData] = React.useState(defaultSeasonsData);

        const toggleSidebar = () => {
          setIsSidebarCollapsed(!isSidebarCollapsed);
        };

        return (
          <div className="app">
            {/* 侧边栏 */}
            <aside className={`sidebar ${isSidebarCollapsed ? 'collapsed' : ''}`}>
              <div className="sidebar-header">
                <h2 className="sidebar-title">菜单</h2>
              </div>
              <button className="toggle-btn" onClick={toggleSidebar}>
                {isSidebarCollapsed ? '→' : '←'}
              </button>
              <nav className="sidebar-menu">
                <div 
                  className={`menu-item ${activeTab === 'players' ? 'active' : ''}`}
                  onClick={() => setActiveTab('players')}
                >
                  <span className="menu-icon">👥</span>
                  <span className="menu-text">球队信息</span>
                </div>
                <div 
                  className={`menu-item ${activeTab === 'schedule' ? 'active' : ''}`}
                  onClick={() => setActiveTab('schedule')}
                >
                  <span className="menu-icon">⚽</span>
                  <span className="menu-text">球队赛程</span>
                </div>
                <div 
                  className={`menu-item ${activeTab === 'seasons' ? 'active' : ''}`}
                  onClick={() => setActiveTab('seasons')}
                >
                  <span className="menu-icon">🏆</span>
                  <span className="menu-text">历史赛季排名</span>
                </div>
                <div 
                  className={`menu-item ${activeTab === 'statistics' ? 'active' : ''}`}
                  onClick={() => setActiveTab('statistics')}
                >
                  <span className="menu-icon">📊</span>
                  <span className="menu-text">历史数据统计</span>
                </div>
              </nav>
            </aside>
            
            {/* 主内容区域 */}
            <div className="main-content">
              <header className="app-header">
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '1rem' }}>
                  <img src="images/shanghaiport-logo.png" alt="上海海港队徽" style={{ width: '60px', height: '60px', borderRadius: '50%', boxShadow: '0 4px 8px rgba(0, 0, 0, 0.3)' }} />
                  <div>
                    <h1>上海海港足球俱乐部数据查询</h1>
                    <h2>Shanghai Port FC Data Query</h2>
                  </div>
                </div>
              </header>
              <main className="app-content">
                {activeTab === 'schedule' && <Schedule scheduleData={scheduleData} />}
                {activeTab === 'players' && <Players playersData={playersData} />}
                {activeTab === 'seasons' && <Seasons seasonsData={seasonsData} />}
                {activeTab === 'statistics' && <Statistics />}
              </main>
              <div className="app-footer">
                <div className="stars-container">
                  <img src="images/shanghaiport-4star.jpg" alt="上海海港四星" className="stars-image" />
                </div>
              </div>
            </div>
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
  </body>
</html>
