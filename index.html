        const [searchTerm, setSearchTerm] = React.useState('');
        const [matchType, setMatchType] = React.useState('all');

        const filteredSchedule = scheduleData.filter(match => {
          const matchesStatus = filter === 'all' || match.status === filter;
          const matchesSearch = searchTerm === '' || 
            match.round.toLowerCase().includes(searchTerm.toLowerCase()) ||
            match.date.includes(searchTerm) ||
            match.homeTeam.toLowerCase().includes(searchTerm.toLowerCase()) ||
            match.awayTeam.toLowerCase().includes(searchTerm.toLowerCase()) ||
            match.city.toLowerCase().includes(searchTerm.toLowerCase());
          const matchesType = matchType === 'all' || 
            (matchType === 'home' && match.homeTeam === '上海海港') ||
            (matchType === 'away' && match.awayTeam === '上海海港');
          return matchesStatus && matchesSearch && matchesType;
        });

        return (
          <div className="card">
            <h2>2026赛季球队赛程</h2>
            <div className="schedule-filters">
              <input
                type="text"
                placeholder="搜索轮次、日期、对手或城市..."
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
                className="search-input"
              />
              <select
                value={matchType}
                onChange={(e) => setMatchType(e.target.value)}
                className="position-filter"
              >
                <option value="all">全部比赛</option>
                <option value="home">主场比赛</option>
                <option value="away">客场比赛</option>
              </select>
              <div className="filter-buttons">
                <button 
                  className={filter === 'all' ? 'active' : ''}
                  onClick={() => setFilter('all')}
                >
                  全部
                </button>
                <button 
                  className={filter === '已结束' ? 'active' : ''}
                  onClick={() => setFilter('已结束')}
                >
                  已结束
                </button>
                <button 
                  className={filter === '未开始' ? 'active' : ''}
                  onClick={() => setFilter('未开始')}
                >
                  未开始
                </button>
              </div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>轮次</th>
                  <th>日期</th>
                  <th>时间</th>
                  <th>主队</th>
                  <th>客队</th>
                  <th>场地</th>
                  <th>城市</th>
                  <th>赛果</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody>
                {filteredSchedule.map(match => (
                  <tr key={match.id}>
                    <td>{match.round}</td>
                    <td>{match.date}</td>
                    <td>{match.time}</td>
                    <td>{match.homeTeam}</td>
                    <td>{match.awayTeam}</td>
                    <td>{match.venue}</td>
                    <td>{match.city}</td>
                    <td>{match.result}</td>
                    <td>{match.status}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      };

      // 球员信息组件
      const Players = () => {
        const [searchTerm, setSearchTerm] = React.useState('');
        const [positionFilter, setPositionFilter] = React.useState('all');

        const filteredPlayers = playersData.filter(player => {
          const matchesSearch = player.name.toLowerCase().includes(searchTerm.toLowerCase());
          const matchesPosition = positionFilter === 'all' || player.position === positionFilter;
          return matchesSearch && matchesPosition;
        });

        const positions = ['all', ...new Set(playersData.map(player => player.position))];

        return (
          <div className="card">
            <h2>球员信息</h2>
            <div className="player-filters">
              <input
                type="text"
                placeholder="搜索球员..."
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
                className="search-input"
              />
              <select
                value={positionFilter}
                onChange={(e) => setPositionFilter(e.target.value)}
                className="position-filter"
              >
                {positions.map(position => (
                  <option key={position} value={position}>
                    {position === 'all' ? '全部位置' : position}
                  </option>
                ))}
              </select>
            </div>
            <table>
              <thead>
                <tr>
                  <th>号码</th>
                  <th>姓名</th>
                  <th>位置</th>
                  <th>年龄</th>
                  <th>国籍</th>
                  <th>身高</th>
                  <th>体重</th>
                </tr>
              </thead>
              <tbody>
                {filteredPlayers.map(player => (
                  <tr key={player.id}>
                    <td>{player.number}</td>
                    <td>{player.name}</td>
                    <td>{player.position}</td>
                    <td>{player.age}</td>
                    <td>{player.nationality}</td>
                    <td>{player.height}</td>
                    <td>{player.weight}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      };

      // 历史赛季组件
      const Seasons = () => {
        return (
          <div className="card">
            <h2>历史赛季成绩</h2>
            <table>
              <thead>
                <tr>
                  <th>赛季</th>
                  <th>联赛</th>
                  <th>排名</th>
                  <th>比赛</th>
                  <th>胜</th>
                  <th>平</th>
                  <th>负</th>
                  <th>进球</th>
                  <th>失球</th>
                  <th>积分</th>
                </tr>
              </thead>
              <tbody>
                {seasonsData.map(season => (
                  <tr key={season.id}>
                    <td>{season.season}</td>
                    <td>{season.league}</td>
                    <td>{season.rank}</td>
                    <td>{season.matches}</td>
                    <td>{season.wins}</td>
                    <td>{season.draws}</td>
                    <td>{season.losses}</td>
                    <td>{season.goalsFor}</td>
                    <td>{season.goalsAgainst}</td>
                    <td>{season.points}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      };

      // 数据统计组件
      const Stats = () => {
        const [activeTab, setActiveTab] = React.useState('players');

        return (
          <div className="card">
            <h2>数据统计</h2>
            <div className="stats-tabs">
              <button 
                className={activeTab === 'players' ? 'active' : ''}
                onClick={() => setActiveTab('players')}
              >
                球员数据
              </button>
              <button 
                className={activeTab === 'team' ? 'active' : ''}
                onClick={() => setActiveTab('team')}
              >
                球队成绩
              </button>
            </div>
            
            {activeTab === 'players' && (
              <table>
                <thead>
                  <tr>
                    <th>球员</th>
                    <th>位置</th>
                    <th>出场</th>
                    <th>进球</th>
                    <th>助攻</th>
                    <th>黄牌</th>
                    <th>红牌</th>
                  </tr>
                </thead>
                <tbody>
                  {playerStatsData.map(player => (
                    <tr key={player.id}>
                      <td>{player.name}</td>
                      <td>{player.position}</td>
                      <td>{player.matches}</td>
                      <td>{player.goals}</td>
                      <td>{player.assists}</td>
                      <td>{player.yellowCards}</td>
                      <td>{player.redCards}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
            
            {activeTab === 'team' && (
              <table>
                <thead>
                  <tr>
                    <th>类别</th>
                    <th>比赛</th>
                    <th>胜</th>
                    <th>平</th>
                    <th>负</th>
                    <th>进球</th>
                    <th>失球</th>
                  </tr>
                </thead>
                <tbody>
                  {teamStatsData.map((team, index) => (
                    <tr key={index}>
                      <td>{team.category}</td>
                      <td>{team.matches}</td>
                      <td>{team.wins}</td>
                      <td>{team.draws}</td>
                      <td>{team.losses}</td>
                      <td>{team.goalsFor}</td>
                      <td>{team.goalsAgainst}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        );
      };

      // 主应用组件
      const App = () => {
        const [activeTab, setActiveTab] = React.useState('schedule');

        return (
          <div className="app">
            <header className="app-header">
              <h1>上海海港足球俱乐部数据查询</h1>
            </header>
            <nav className="app-nav">
              <button 
                className={activeTab === 'schedule' ? 'active' : ''}
                onClick={() => setActiveTab('schedule')}
              >
                球队赛程
              </button>
              <button 
                className={activeTab === 'players' ? 'active' : ''}
                onClick={() => setActiveTab('players')}
              >
                球员信息
              </button>
              <button 
                className={activeTab === 'seasons' ? 'active' : ''}
                onClick={() => setActiveTab('seasons')}
              >
                历史赛季
              </button>
              <button 
                className={activeTab === 'stats' ? 'active' : ''}
                onClick={() => setActiveTab('stats')}
              >
                数据统计
              </button>
            </nav>
            <main className="app-content">
              {activeTab === 'schedule' && <Schedule />}
              {activeTab === 'players' && <Players />}
              {activeTab === 'seasons' && <Seasons />}
              {activeTab === 'stats' && <Stats />}
            </main>
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
  </body>
</html>
