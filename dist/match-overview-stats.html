<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>赛事统计详情</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        font-family: 'Noto Sans SC', Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
        line-height: 1.4;
        font-weight: 400;
        color-scheme: light dark;
        color: rgba(255, 255, 255, 0.87);
        background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      }

      .app {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }

      .app-header {
        background: linear-gradient(90deg, #c00010 0%, #a0000e 100%);
        padding: 1rem;
        text-align: center;
        border-bottom: 3px solid #80000c;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }

      .app-header h1 {
        font-size: 1.5rem;
        color: #ffffff;
        font-weight: 700;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        margin-bottom: 0.3rem;
      }

      .app-header h2 {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 400;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        margin: 0;
      }

      .app-header h3 {
        font-size: 1.8rem;
        color: #ffffff;
        font-weight: 800;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        margin: 0.3rem 0 0 0;
        letter-spacing: 0.1em;
      }

      .app-content {
        flex: 1;
        padding: 1rem;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
        overflow-y: auto;
      }

      .floating-scoreboard {
        background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
        border-radius: 12px;
        padding: 0.75rem 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }

      .scoreboard-teams {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
      }

      .team-name {
        font-size: 1.3rem;
        font-weight: 700;
        color: #fff;
        min-width: 120px;
      }

      .team-name.home {
        text-align: right;
      }

      .team-name.away {
        text-align: left;
      }

      .score {
        font-size: 2.5rem;
        font-weight: 700;
        color: #c00010;
        text-shadow: 0 0 20px rgba(192, 0, 16, 0.5);
      }

      .score-separator {
        color: #666;
        margin: 0 0.5rem;
      }

      .scorers {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid #444;
      }

      .scorers-team {
        text-align: center;
      }

      .scorers-team h4 {
        color: #888;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }

      .scorers-list {
        font-size: 0.85rem;
        color: #ccc;
      }

      .scorers-list div {
        margin: 0.3rem 0;
      }

      .stats-section {
        background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }

      .stats-section-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: #c00010;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #444;
      }

      .stats-item {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0.75rem 0;
        border-bottom: 1px solid #333;
      }

      .stats-item.pie-chart-item-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .stats-item:last-child {
        border-bottom: none;
      }

      .stats-label {
        text-align: center;
        color: #888;
        font-weight: 500;
      }

      .stats-value-home {
        text-align: right;
        color: #fff;
        font-weight: 700;
        padding-right: 1rem;
      }

      .stats-value-away {
        text-align: left;
        color: #fff;
        font-weight: 700;
        padding-left: 1rem;
      }

      .stats-bar-container {
        display: flex;
        height: 16px;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 0.5rem;
        background: rgba(68, 68, 68, 0.5);
      }

      .stats-bar-center-line {
        width: 2px;
        background: #666;
        flex-shrink: 0;
      }

      .stats-bar-side {
        flex: 1;
        display: flex;
        justify-content: flex-end;
        overflow: hidden;
      }

      .stats-bar-side.away {
        justify-content: flex-start;
      }

      .stats-bar-fill-home {
        height: 100%;
        background: linear-gradient(90deg, #80000c 0%, #c00010 50%, #e00012 100%);
        border-radius: 8px 0 0 8px;
        transition: width 0.5s ease;
        min-width: 0;
      }

      .stats-bar-fill-away {
        height: 100%;
        background: linear-gradient(90deg, #0088ff 0%, #0066cc 50%, #0044aa 100%);
        border-radius: 0 8px 8px 0;
        transition: width 0.5s ease;
        min-width: 0;
      }

      .possession-bar {
        display: flex;
        height: 20px;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 0.5rem;
      }

      .possession-home {
        background: linear-gradient(90deg, #80000c 0%, #c00010 50%, #e00012 100%);
      }

      .possession-away {
        background: linear-gradient(90deg, #0088ff 0%, #0066cc 50%, #0044aa 100%);
      }

      .stats-item-inline {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem 0;
      }

      .stats-item-inline .stats-value-home {
        font-weight: 700;
        color: #fff;
        min-width: 30px;
        text-align: right;
      }

      .stats-item-inline .stats-value-away {
        font-weight: 700;
        color: #fff;
        min-width: 30px;
        text-align: left;
      }

      .pie-chart-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        padding: 0.5rem 0;
      }

      .pie-chart-item {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }

      .pie-chart {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: conic-gradient(var(--pie-color, #c00010) var(--pie-percent), #444 var(--pie-percent));
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .pie-chart::before {
        content: '';
        position: absolute;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #2a2a2a;
      }

      .pie-chart span {
        position: relative;
        z-index: 1;
        font-size: 0.7rem;
        font-weight: 700;
        color: #fff;
      }

      .pie-chart-value {
        font-size: 0.85rem;
        color: #ccc;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1rem;
      }

      .stats-card {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        padding: 1rem;
      }

      .stats-card-title {
        color: #c00010;
        font-weight: 600;
        margin-bottom: 0.75rem;
        font-size: 1rem;
      }

      .loading {
        text-align: center;
        padding: 3rem;
        color: #888;
      }

      .error {
        text-align: center;
        padding: 3rem;
        color: #ff4444;
      }

      .back-link {
        display: inline-block;
        color: #c00010;
        text-decoration: none;
        margin-bottom: 1rem;
        font-weight: 500;
      }

      .back-link:hover {
        text-decoration: underline;
      }

      @media (max-width: 768px) {
        .scoreboard-teams {
          gap: 1rem;
        }

        .team-name {
          font-size: 1rem;
          min-width: 80px;
        }

        .score {
          font-size: 2rem;
        }

        .scorers {
          grid-template-columns: 1fr;
        }

        .stats-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1 id="team-title">⚽ 上海海港 vs 浙江队</h1>
        <h2 id="match-title">2026赛季中国足球协会超级联赛 - 第12轮</h2>
        <h3 id="stats-title">赛事统计详情</h3>
      </header>
      <main class="app-content" id="content">
        <div class="loading">正在加载数据...</div>
      </main>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const content = document.getElementById('content');
        const urlParams = new URLSearchParams(window.location.search);
        const date = urlParams.get('date');
        const type = urlParams.get('type');
        const round = urlParams.get('round');

        if (!date || !type || !round) {
          content.innerHTML = '<div class="error"><p>缺少比赛信息参数，请从赛程页面进入。</p></div>';
        } else {
          const processedType = type.replace('联赛', '');
          const fileName = `${date}-${processedType}-${round}-MO.json`;
          const filePath = `data/team-a/${fileName}`;

          console.log('文件路径:', filePath);

          fetch(filePath)
            .then(response => {
              if (!response.ok) {
                throw new Error('数据文件未找到');
              }
              return response.json();
            })
            .then(data => {
              console.log('数据加载成功:', data);
              renderStats(data);
            })
            .catch(error => {
              console.error('加载数据失败:', error);
              content.innerHTML = '<div class="error"><p>加载数据失败，请确保数据文件存在。</p></div>';
            });
        }
      });

      function renderStats(data) {
        const content = document.getElementById('content');
        const overview = data.match_overview;
        const stats = data.statistics;

        const homeTeam = overview.home_team;
        const awayTeam = overview.away_team;

        document.getElementById('team-title').textContent = `⚽ ${homeTeam} vs ${awayTeam}`;
        document.getElementById('match-title').textContent = `2026赛季${overview.competition} - ${overview.round}`;

        let html = `
          <div class="floating-scoreboard">
            <div class="scoreboard-teams">
              <div class="team-name home">${homeTeam}</div>
              <div class="score">${overview.score}</div>
              <div class="team-name away">${awayTeam}</div>
            </div>
          </div>

          <div class="stats-section">
            <div class="stats-section-title">📊 控球与预期进球</div>
            ${renderPossessionStats('控球率', stats.possession)}
            ${renderValueStats('预期进球 (xG)', stats.expected_goals)}
            ${renderValueStats('射正预期进球 (xGOT)', stats.expected_goals_on_target || { home: '数据缺失', away: '数据缺失' })}
            ${renderValueStats('绝佳机会', stats.big_chances)}
          </div>

          <div class="stats-section">
            <div class="stats-section-title">🎯 射门</div>
            ${renderValueStats('总射门', stats.shots.total)}
            ${renderValueStats('射正', stats.shots.on_target)}
            ${renderValueStats('射偏', stats.shots.off_target)}
            ${renderValueStats('被封堵', stats.shots.blocked)}
            ${renderValueStats('击中门框', stats.shots.woodwork)}
            ${renderValueStats('禁区内射门', stats.shots.inside_box)}
            ${renderValueStats('禁区外射门', stats.shots.outside_box)}
          </div>

          <div class="stats-section">
            <div class="stats-section-title">⚡ 进攻</div>
            ${renderValueStats('绝佳机会进球', stats.attacking.big_chances_scored)}
            ${renderValueStats('错失绝佳机会', stats.attacking.big_chances_missed)}
            ${renderValueStats('直塞球', stats.attacking.through_balls)}
            ${renderValueStats('对方禁区触球', stats.attacking.touches_in_opposition_box)}
            ${renderValueStats('最后三区被犯规', stats.attacking.fouled_in_final_third)}
            ${renderValueStats('界外球', stats.attacking.throw_ins)}
            ${renderValueStats('进攻三区进入次数', stats.attacking.final_third_entries)}
          </div>

          <div class="stats-section">
            <div class="stats-section-title">🔄 传球</div>
            ${renderValueStats('总传球', stats.passing.total_passes)}
            ${renderValueStats('精确传球', stats.passing.accurate_passes)}
            ${renderPercentStats('传球成功率', stats.passing.pass_accuracy)}
            ${renderTextStats('最后一传', stats.passing.final_third_passes)}
            ${renderTextStats('长传球', stats.passing.long_balls)}
            ${renderTextStats('传中', stats.passing.crosses)}
          </div>

          <div class="stats-section">
            <div class="stats-section-title">🤼 对抗</div>
            ${renderPossessionStats('总对抗', stats.duels.total_duels)}
            ${renderValueStats('被断球', stats.duels.dispossessed)}
            ${renderTextStats('地面对抗', stats.duels.ground_duels)}
            ${renderTextStats('空中对抗', stats.duels.aerial_duels)}
            ${renderTextStats('盘带', stats.duels.dribbles)}
          </div>

          <div class="stats-section">
            <div class="stats-section-title">🛡️ 防守</div>
            ${renderPercentStats('铲抢成功率', stats.defensive.tackles_won)}
            ${renderValueStats('铲抢', stats.defensive.tackles)}
            ${renderValueStats('拦截', stats.defensive.interceptions)}
            ${renderValueStats('球权恢复', stats.defensive.recoveries)}
            ${renderValueStats('解围', stats.defensive.clearances)}
          </div>

          <div class="stats-section">
            <div class="stats-section-title">🥅 门将</div>
            ${renderValueStats('扑救', stats.goalkeeping.saves)}
            ${renderValueStats('高空球', stats.goalkeeping.high_claims)}
            ${renderValueStats('出击击球', stats.goalkeeping.punches)}
            ${renderValueStats('球门球', stats.goalkeeping.goal_kicks)}
          </div>

          <div class="stats-section">
            <div class="stats-section-title">🎪 定位球</div>
            ${renderValueStats('角球', stats.set_pieces.corners)}
            ${renderValueStats('犯规', stats.set_pieces.fouls)}
            ${renderValueStats('任意球', stats.set_pieces.free_kicks)}
            ${renderValueStats('越位', stats.set_pieces.offsides)}
            ${renderValueStats('黄牌', stats.set_pieces.yellow_cards)}
            ${renderValueStats('红牌', stats.set_pieces.red_cards)}
          </div>
        `;

        content.innerHTML = html;
      }

      function renderPossessionStats(label, values) {
        const homeVal = values.home;
        const awayVal = values.away;
        const homePercent = parseInt(homeVal);
        const awayPercent = parseInt(awayVal);
        
        return `
          <div style="margin-bottom: 0.5rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.3rem;">
              <span>${homeVal}</span>
              <span>${label}</span>
              <span>${awayVal}</span>
            </div>
            <div class="possession-bar">
              <div class="possession-home" style="width: ${homePercent}%"></div>
              <div class="possession-away" style="width: ${awayPercent}%"></div>
            </div>
          </div>
        `;
      }

      function renderPercentStats(label, values) {
        const homeVal = values.home;
        const awayVal = values.away;
        const homePercent = parseInt(homeVal);
        const awayPercent = parseInt(awayVal);
        const homeBrightness = homePercent >= awayPercent ? 1 : 0.7;
        const awayBrightness = awayPercent >= homePercent ? 1 : 0.7;
        
        return `
          <div style="margin-bottom: 0.5rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.3rem;">
              <span>${homeVal}</span>
              <span>${label}</span>
              <span>${awayVal}</span>
            </div>
            <div class="stats-bar-container">
              <div class="stats-bar-side">
                <div class="stats-bar-fill-home" style="width: ${homePercent}%; opacity: ${homeBrightness}; filter: brightness(${homeBrightness});"></div>
              </div>
              <div class="stats-bar-center-line"></div>
              <div class="stats-bar-side away">
                <div class="stats-bar-fill-away" style="width: ${awayPercent}%; opacity: ${awayBrightness}; filter: brightness(${awayBrightness});"></div>
              </div>
            </div>
          </div>
        `;
      }

      function renderValueStats(label, values) {
        const homeVal = values.home;
        const awayVal = values.away;
        const maxVal = Math.max(homeVal, awayVal, 1);
        const homePercent = (homeVal / maxVal) * 100;
        const awayPercent = (awayVal / maxVal) * 100;
        const homeBrightness = homeVal >= awayVal ? 1 : 0.7;
        const awayBrightness = awayVal >= homeVal ? 1 : 0.7;

        if (label) {
          return `
            <div style="margin-bottom: 0.5rem;">
              <div style="display: flex; justify-content: space-between; margin-bottom: 0.3rem;">
                <span>${homeVal}</span>
                <span>${label}</span>
                <span>${awayVal}</span>
              </div>
              <div class="stats-bar-container">
                <div class="stats-bar-side">
                  <div class="stats-bar-fill-home" style="width: ${homePercent}%; opacity: ${homeBrightness}; filter: brightness(${homeBrightness});"></div>
                </div>
                <div class="stats-bar-center-line"></div>
                <div class="stats-bar-side away">
                  <div class="stats-bar-fill-away" style="width: ${awayPercent}%; opacity: ${awayBrightness}; filter: brightness(${awayBrightness});"></div>
                </div>
              </div>
            </div>
          `;
        } else {
          return `
            <div class="stats-item-inline">
              <span class="stats-value-home">${homeVal}</span>
              <div class="stats-bar-container">
                <div class="stats-bar-side">
                  <div class="stats-bar-fill-home" style="width: ${homePercent}%; opacity: ${homeBrightness}; filter: brightness(${homeBrightness});"></div>
                </div>
                <div class="stats-bar-center-line"></div>
                <div class="stats-bar-side away">
                  <div class="stats-bar-fill-away" style="width: ${awayPercent}%; opacity: ${awayBrightness}; filter: brightness(${awayBrightness});"></div>
                </div>
              </div>
              <span class="stats-value-away">${awayVal}</span>
            </div>
          `;
        }
      }

      function renderTextStats(label, values) {
        const homeVal = values.home;
        const awayVal = values.away;
        const homePercent = parseInt(homeVal.match(/\((\d+)%\)/)?.[1] || 0);
        const awayPercent = parseInt(awayVal.match(/\((\d+)%\)/)?.[1] || 0);
        
        return `
          <div class="stats-item pie-chart-item-wrapper">
            <div class="pie-chart-container">
              <div class="pie-chart-item">
                <span class="pie-chart-value">${homeVal}</span>
                <div class="pie-chart" style="--pie-color: #c00010; --pie-percent: ${homePercent}%">
                  <span>${homePercent}%</span>
                </div>
              </div>
              <div style="color: #888; font-weight: 500; min-width: 80px; text-align: center;">${label}</div>
              <div class="pie-chart-item">
                <div class="pie-chart" style="--pie-color: #0066cc; --pie-percent: ${awayPercent}%">
                  <span>${awayPercent}%</span>
                </div>
                <span class="pie-chart-value">${awayVal}</span>
              </div>
            </div>
          </div>
        `;
      }
    </script>
  </body>
</html>
