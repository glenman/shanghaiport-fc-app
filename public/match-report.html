<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>上海海港 vs 河南俱乐部 - 赛事报告</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        font-family: 'Noto Sans SC', Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
        line-height: 1.4;
        font-weight: 400;
        color-scheme: light dark;
        color: rgba(255, 255, 255, 0.87);
        background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      }

      .app {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }

      .app-header {
        background: linear-gradient(90deg, #c00010 0%, #a0000e 100%);
        padding: 1rem;
        text-align: center;
        border-bottom: 3px solid #80000c;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }

      .app-header h1 {
        font-size: 1.5rem;
        color: #ffffff;
        font-weight: 700;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        margin-bottom: 0.3rem;
      }

      .app-header h2 {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 400;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        margin: 0;
      }

      .app-content {
        flex: 1;
        padding: 1rem;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
        overflow-y: auto;
      }

      .card {
        background: rgba(40, 40, 40, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        border-left: 4px solid #c00010;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
      }

      .card h2 {
        margin-bottom: 1rem;
        color: #c00010;
        font-size: 1.4rem;
        font-weight: 700;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .card h2::before {
        content: '⚽';
        font-size: 1rem;
      }

      .card h3 {
        margin: 1rem 0 0.6rem 0;
        color: #c00010;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .card h5 {
        margin: 0.6rem 0 0.3rem 0;
        color: #c00010;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .match-info {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .match-info-item {
        flex: 1;
        min-width: 180px;
        font-size: 0.9rem;
      }

      .match-info-item strong {
        color: #c00010;
      }

      .match-summary {
        margin-bottom: 1rem;
        line-height: 1.5;
        font-size: 0.95rem;
      }

      .match-summary p {
        margin-bottom: 0.5rem;
      }

      .match-highlights {
        margin-bottom: 1rem;
      }

      .match-highlights ul {
        list-style: disc;
        padding-left: 1.5rem;
      }

      .match-highlights li {
        margin-bottom: 0.5rem;
        line-height: 1.4;
        font-size: 0.95rem;
      }

      .lineups {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .lineup {
        flex: 1;
        min-width: 280px;
      }

      .lineup h4 {
        margin-bottom: 0.6rem;
        color: #c00010;
        font-size: 1rem;
        font-weight: 600;
      }

      .lineup p {
        margin-bottom: 0.4rem;
        font-size: 0.9rem;
      }

      .lineup ul {
        list-style: none;
        padding-left: 0.5rem;
      }

      .lineup li {
        margin-bottom: 0.3rem;
        line-height: 1.3;
        font-size: 0.9rem;
      }

      .statistics table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 0.6rem;
        font-size: 0.9rem;
      }

      .statistics th, .statistics td {
        padding: 0.6rem 0.8rem;
        text-align: center;
        border-bottom: 1px solid #444;
      }

      .statistics th {
        background: linear-gradient(90deg, #c00010, #a0000e);
        color: #fff;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-size: 0.85rem;
      }

      .statistics tr:hover {
        background-color: rgba(60, 60, 60, 0.6);
      }

      .possession-bar {
        display: flex;
        height: 20px;
        border-radius: 10px;
        overflow: hidden;
        margin: 0.5rem 0;
      }

      .possession-home {
        background: linear-gradient(90deg, #c00010, #ff4757);
      }

      .possession-away {
        background: linear-gradient(90deg, #2ed573, #1e90ff);
      }

      .match-goals {
        margin-bottom: 1rem;
      }

      .goals-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        overflow: hidden;
      }

      @media (max-width: 768px) {
        .goals-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 480px) {
        .scoreboard-teams {
          flex-direction: column;
          gap: 0.5rem;
        }
        
        .team-name {
          font-size: 1.1rem;
          min-width: auto;
          text-align: center !important;
        }
        
        .team-name.home, .team-name.away {
          text-align: center !important;
        }
        
        .score-display {
          font-size: 2rem;
          min-width: auto;
          text-align: center;
        }
        
        .scoreboard-info {
          font-size: 0.85rem;
          gap: 0.3rem;
        }
        
        .scoreboard-info-row {
          gap: 0.8rem;
          flex-wrap: wrap;
        }
        
        .match-info-item {
          min-width: auto;
          font-size: 0.85rem;
        }
        
        .card h2 {
          font-size: 1.2rem;
        }
        
        .card h3 {
          font-size: 1rem;
        }
        
        .statistics table {
          font-size: 0.8rem;
        }
        
        .statistics th, .statistics td {
          padding: 0.4rem 0.3rem;
        }
        
        .lineup li {
          font-size: 0.85rem;
        }
        
        .possession-bar {
          height: 16px;
        }
        
        .goal-player {
          font-size: 0.85rem;
        }
        
        .goal-time {
          font-size: 0.8rem;
        }
      }

      .goals-team {
        background: rgba(50, 50, 50, 0.8);
        padding: 1rem;
      }

      .goals-team h4 {
        color: #c00010;
        font-size: 1.1rem;
        margin-bottom: 0.5rem;
      }

      .goals-list {
        list-style: none;
        padding: 0;
      }

      .goals-list li {
        padding: 0.4rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
      }

      .goals-list li:last-child {
        border-bottom: none;
      }

      .goal-player {
        flex: 1;
        margin-left: 0.5rem;
      }

      .goal-time {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.9rem;
      }

      .goal-number {
        color: #c00010;
        font-weight: 700;
        min-width: 40px;
      }

      .scoreboard {
        background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      .scoreboard-teams {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        margin-bottom: 1rem;
      }

      .team-name {
        font-size: 1.2rem;
        font-weight: 700;
        color: #fff;
        min-width: 120px;
      }

      .team-name.home {
        text-align: right;
      }

      .team-name.away {
        text-align: left;
      }

      .score-display {
        font-size: 2.5rem;
        font-weight: 700;
        color: #c00010;
        min-width: 100px;
        text-align: center;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }

      .scoreboard-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.7);
      }

      .scoreboard-info-row {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
      }

      .scoreboard-info span {
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .key-factors ul {
        list-style: disc;
        padding-left: 1.5rem;
      }

      .key-factors li {
        margin-bottom: 0.4rem;
        line-height: 1.4;
        font-size: 0.95rem;
      }

      .back-link {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.6rem 1.2rem;
        background: linear-gradient(90deg, #c00010, #a0000e);
        color: #fff;
        text-decoration: none;
        border-radius: 20px;
        font-weight: 500;
        transition: all 0.3s ease;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        font-size: 0.9rem;
      }

      .back-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
      }

      @media (max-width: 768px) {
        .app-content {
          padding: 0.8rem;
        }

        .card {
          padding: 0.8rem;
        }

        .match-info {
          flex-direction: column;
          gap: 0.6rem;
        }
        
        .scoreboard-teams {
          flex-direction: column;
          gap: 0.5rem;
        }
        
        .team-name {
          font-size: 1.1rem;
          min-width: auto;
          text-align: center !important;
        }
        
        .team-name.home, .team-name.away {
          text-align: center !important;
        }
        
        .score-display {
          font-size: 2.2rem;
          min-width: auto;
          text-align: center;
        }

        .lineups {
          flex-direction: column;
        }

        .statistics table {
          font-size: 0.85rem;
        }

        .statistics th, .statistics td {
          padding: 0.5rem 0.6rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>加载中...</h1>
        <h2>比赛信息加载中...</h2>
      </header>
      <main class="app-content">
        <div class="card">
          <h2>赛事报告</h2>
          
          <div class="match-info" id="match-info">
            <!-- 比赛信息将通过 JavaScript 动态填充 -->
          </div>
          
          <div class="scoreboard" id="match-scoreboard">
            <!-- 比分信息将通过 JavaScript 动态填充 -->
          </div>
          
          <h3>进球记录</h3>
          <div class="match-goals" id="match-goals">
            <!-- 进球记录将通过 JavaScript 动态填充 -->
          </div>

          <h3>比赛摘要</h3>
          <div class="match-summary" id="match-summary">
            <!-- 比赛摘要将通过 JavaScript 动态填充 -->
          </div>

          <h3>比赛亮点</h3>
          <div class="match-highlights" id="match-highlights">
            <!-- 比赛亮点将通过 JavaScript 动态填充 -->
          </div>

          <h3>阵容</h3>
          <div class="lineups" id="match-lineups">
            <!-- 阵容将通过 JavaScript 动态填充 -->
          </div>

          <h3>比赛统计</h3>
          <div class="statistics" id="match-statistics">
            <!-- 比赛统计将通过 JavaScript 动态填充 -->
          </div>

          <h3>关键因素</h3>
          <div class="key-factors" id="key-factors">
            <!-- 关键因素将通过 JavaScript 动态填充 -->
          </div>

          <script>
            // 添加调试信息
            console.log('match-report.html 加载');
            
            // 从URL参数中获取比赛信息
            function getUrlParams() {
              const params = {};
              const urlParams = new URLSearchParams(window.location.search);
              for (const [key, value] of urlParams.entries()) {
                params[key] = value;
              }
              return params;
            }

            // 加载赛事报告数据
            const params = getUrlParams();
            console.log('URL参数:', params);
            const { date, type, round, source } = params;

            if (!date || !type || !round) {
              console.log('缺少比赛信息参数');
              document.getElementById('match-info').innerHTML = '<p>缺少比赛信息参数，请从赛程页面进入。</p>';
            } else {
              console.log('参数完整，开始加载数据');
              // 构建JSON文件路径
              let filePath;
              // 处理type参数，将"中超联赛"转换为"中超"
              const processedType = type.replace('联赛', '');
              if (source === 'h') {
                // 历史比赛，从history目录读取
                const year = date.substring(0, 4);
                const fileName = `${date}-${processedType}-${round}.json`;
                filePath = `data/history/${year}/${fileName}`;
              } else {
                // 当前赛季，从data目录读取
                const fileName = `${date}-${processedType}-${round}.json`;
                filePath = `data/${fileName}`;
              }

              console.log('文件路径:', filePath);

              // 添加时间戳参数避免浏览器缓存
              const timestamp = new Date().getTime();
              const urlWithCacheBust = `${filePath}?t=${timestamp}`;
              console.log('请求URL:', urlWithCacheBust);
              
              fetch(urlWithCacheBust)
                .then(response => {
                  console.log('响应状态:', response.status);
                  if (!response.ok) {
                    throw new Error('找不到对应的赛事报告');
                  }
                  return response.json();
                })
                .then(data => {
                  console.log('成功加载数据:', data);
                  // 填充比分板
                  const matchScoreboard = document.getElementById('match-scoreboard');
                  const details = data.matchDetails || {};
                  
                  // 动态计算半场比分
                  function calculateHalftimeScore() {
                    const goalHighlights = data.highlights.filter(h => h.type === 'goal');
                    let homeHalftimeGoals = 0;
                    let awayHalftimeGoals = 0;
                    
                    goalHighlights.forEach(goal => {
                      // 解析进球时间，判断是否在上半场（≤45分钟）
                      const timeStr = goal.time.replace("'", '');
                      const minute = parseInt(timeStr.split('+')[0]);
                      if (minute <= 45) {
                        if (goal.team === 'home') {
                          homeHalftimeGoals++;
                        } else if (goal.team === 'away') {
                          awayHalftimeGoals++;
                        }
                      }
                    });
                    
                    return `${homeHalftimeGoals}-${awayHalftimeGoals}`;
                  }
                  
                  const halftimeScore = calculateHalftimeScore();
                  
                  matchScoreboard.innerHTML = `
                    <div class="scoreboard-teams">
                      <div class="team-name home">${data.match.homeTeam}</div>
                      <div class="score-display">${data.match.result}</div>
                      <div class="team-name away">${data.match.awayTeam}</div>
                    </div>
                    <div class="scoreboard-info">
                      <div class="scoreboard-info-row">
                        <span>📍 ${data.match.city}</span>
                        <span>📅 ${data.match.date} ${data.match.time}</span>
                        ${details.temperature ? `<span>🌡️ ${details.temperature}</span>` : ''}
                      </div>
                      <div class="scoreboard-info-row">
                        <span>🏟️ ${data.match.venue}</span>
                        ${data.match.attendance && data.match.attendance !== '未知' ? `<span>👥 ${data.match.attendance}</span>` : ''}
                      </div>
                      <div class="scoreboard-info-row">
                        <span>⏱️ 半场: ${halftimeScore}</span>
                      </div>
                    </div>
                  `;



                  // 填充进球记录
                  const matchGoals = document.getElementById('match-goals');
                  
                  // 从highlights中提取进球记录
                  const goalHighlights = data.highlights.filter(h => h.type === 'goal');
                  
                  if (goalHighlights.length > 0) {
                    const homeGoals = goalHighlights.filter(h => h.team === 'home');
                    const awayGoals = goalHighlights.filter(h => h.team === 'away');
                    
                    function renderGoalList(goals, teamName) {
                      if (goals.length === 0) return '';
                      
                      let html = `
                        <div class="goals-team">
                          <h4>${teamName}</h4>
                          <ul class="goals-list">
                      `;
                      
                      goals.forEach((goal, index) => {
                        let specialMark = '';
                        let ballIcon = '⚽';
                        
                        if (goal.goal_type === 'own_goal') {
                          ballIcon = '<span style="color: #ff6b6b;">⚽</span>';
                          specialMark = ' <span style="color: #ff6b6b; font-weight: bold;">(OG)</span>';
                        } else if (goal.goal_type === 'penalty_goal') {
                          specialMark = ' <span style="color: #4ecdc4; font-weight: bold;">(P)</span>';
                        }
                        
                        const playerName = goal.player || goal.scorer;
                        const assistPlayer = goal.player2 || goal.assist;
                        
                        html += `
                          <li>
                            <span>
                              <span class="goal-number">${index + 1}.</span>
                              <span class="goal-player">${ballIcon} ${playerName}</span>${specialMark}
                              ${assistPlayer ? `<span style="color: rgba(255, 255, 255, 0.6); font-size: 0.85rem;"> (助攻: ${assistPlayer})</span>` : ''}
                            </span>
                            <span class="goal-time">${goal.time}</span>
                          </li>
                        `;
                      });
                      
                      html += '</ul></div>';
                      return html;
                    }
                    
                    matchGoals.innerHTML = `
                      <div class="goals-grid">
                        ${renderGoalList(homeGoals, data.match.homeTeam)}
                        ${renderGoalList(awayGoals, data.match.awayTeam)}
                      </div>
                    `;
                  } else {
                    matchGoals.innerHTML = '<p style="text-align: center; color: rgba(255, 255, 255, 0.6);">暂无进球记录</p>';
                  }

                  // 填充比赛摘要
                  const matchSummary = document.getElementById('match-summary');
                  // 将摘要文本按句号分割成段落
                  const summaryParagraphs = data.summary.split('。').filter(p => p.trim() !== '');
                  let summaryHTML = '';
                  summaryParagraphs.forEach(paragraph => {
                    summaryHTML += `<p>${paragraph}。</p>`;
                  });
                  matchSummary.innerHTML = summaryHTML;

                  // 填充比赛亮点
                  const matchHighlights = document.getElementById('match-highlights');
                  let highlightsHTML = '<ul>';
                  data.highlights.forEach(highlight => {
                    highlightsHTML += `<li><strong>${highlight.time}</strong> - ${highlight.description}</li>`;
                  });
                  highlightsHTML += '</ul>';
                  matchHighlights.innerHTML = highlightsHTML;

                  // 填充阵容
                  const matchLineups = document.getElementById('match-lineups');
                  let lineupsHTML = `
                    <div class="lineup">
                      <h4>${data.lineups.home.name} (${data.lineups.home.formation})</h4>
                      <p><strong>主教练:</strong> ${data.lineups.home.manager}</p>
                      <p><strong>队长:</strong> ${data.lineups.home.captain}</p>
                      <ul>
                        ${data.lineups.home.players.map(player => 
                          `<li><strong>${player.number}.</strong> ${player.name} (${player.position}, ${player.nationality})</li>`
                        ).join('')}
                      </ul>
                      <h5>替补:</h5>
                      <ul>
                        ${data.lineups.home.substitutes.map(sub => 
                          `<li><strong>${sub.number}.</strong> ${sub.name} (${sub.position}) - ${sub.substitutedAt}' 换下 ${sub.substitutedFor}</li>`
                        ).join('')}
                      </ul>
                    </div>
                    <div class="lineup">
                      <h4>${data.lineups.away.name} (${data.lineups.away.formation})</h4>
                      <p><strong>主教练:</strong> ${data.lineups.away.manager}</p>
                      <p><strong>队长:</strong> ${data.lineups.away.captain}</p>
                      <ul>
                        ${data.lineups.away.players.map(player => 
                          `<li><strong>${player.number}.</strong> ${player.name} (${player.position}, ${player.nationality})</li>`
                        ).join('')}
                      </ul>
                      <h5>替补:</h5>
                      <ul>
                        ${data.lineups.away.substitutes.map(sub => 
                          `<li><strong>${sub.number}.</strong> ${sub.name} (${sub.position}) - ${sub.substitutedAt}' 换下 ${sub.substitutedFor}</li>`
                        ).join('')}
                      </ul>
                    </div>
                  `;
                  matchLineups.innerHTML = lineupsHTML;

                  // 填充比赛统计
                  const matchStatistics = document.getElementById('match-statistics');
                  
                  // 提取控球率数据
                  const possession = data.statistics.find(s => s.name === '控球率');
                  let possessionHtml = '';
                  
                  if (possession) {
                    const homeVal = parseInt(possession.home);
                    const awayVal = parseInt(possession.away);
                    possessionHtml = `
                      <div style="margin-bottom: 1rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.3rem;">
                          <span>${possession.home}</span>
                          <span>控球率</span>
                          <span>${possession.away}</span>
                        </div>
                        <div class="possession-bar">
                          <div class="possession-home" style="width: ${homeVal}%"></div>
                          <div class="possession-away" style="width: ${awayVal}%"></div>
                        </div>
                      </div>
                    `;
                  }
                  
                  // 其他统计项
                  const otherStats = data.statistics.filter(s => s.name !== '控球率');
                  
                  let statisticsHTML = possessionHtml + `
                    <table>
                      <thead>
                        <tr>
                          <th>${data.match.homeTeam}</th>
                          <th>统计项</th>
                          <th>${data.match.awayTeam}</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${otherStats.map(stat => `
                          <tr>
                            <td>${stat.home}</td>
                            <td>${stat.name}</td>
                            <td>${stat.away}</td>
                          </tr>
                        `).join('')}
                      </tbody>
                    </table>
                  `;
                  matchStatistics.innerHTML = statisticsHTML;

                  // 填充关键因素
                  const keyFactors = document.getElementById('key-factors');
                  if (data.keyFactors && data.keyFactors.length > 0) {
                    let keyFactorsHTML = '<ul>';
                    data.keyFactors.forEach(factor => {
                      keyFactorsHTML += `<li>${factor}</li>`;
                    });
                    keyFactorsHTML += '</ul>';
                    keyFactors.innerHTML = keyFactorsHTML;
                  } else {
                    keyFactors.innerHTML = '<p>暂无关键因素分析</p>';
                  }

                  // 更新页面标题
                  document.title = `${data.match.homeTeam} vs ${data.match.awayTeam} - 赛事报告`;
                  document.querySelector('.app-header h1').textContent = `${data.match.homeTeam} vs ${data.match.awayTeam}`;
                  document.querySelector('.app-header h2').textContent = `${date.substring(0, 4)}赛季${type}联赛 - ${round}`;
                })
                .catch(error => {
                  console.error('加载赛事报告数据失败:', error);
                  document.getElementById('match-info').innerHTML = `<p>加载赛事报告数据失败: ${error.message}</p>`;
                });
            }
          </script>

          <a href="javascript:window.history.back()" class="back-link">返回</a>
        </div>
      </main>
    </div>
  </body>
</html>
